name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  client:
    name: Client — TypeScript + Build + Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
      - run: npm test

  server:
    name: Server — TypeScript + Build + Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sheria
          POSTGRES_PASSWORD: sheria_test
          POSTGRES_DB: sheria_check_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
        env:
          DATABASE_URL: postgres://sheria:sheria_test@localhost:5432/sheria_check_test
          ADMIN_PASSWORD: test_admin
