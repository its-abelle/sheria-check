services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sheria
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sheria_prod}
      POSTGRES_DB: sheria_check
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sheria -d sheria_check"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5432:5432"

  server:
    build: ./server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://sheria:${DB_PASSWORD:-sheria_prod}@db:5432/sheria_check
      PORT: "4000"
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      PG_POOL_SIZE: ${PG_POOL_SIZE:-20}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  client:
    build: ./client
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-80}:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  pgdata:
